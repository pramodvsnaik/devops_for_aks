---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: blue-deployment
spec:
  replicas: 3 
  selector:
    matchLabels:
      app: blue
  template:
    metadata:
      labels:
        app: blue
    spec:
      containers: 
        name: blue-container
        image: cosmotal.azurecr.io/blue:v1
         ports:
          - name: http 
            containerPort: 80
      resources:
           limits:
             cpu: "0.5"
             memory: "512Mi"
           requests:
             cpu: "0.25"
             memory: "256Mi"         