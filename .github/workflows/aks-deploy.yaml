name: "AKS Deployment"


on:
  push:
    branches:
      - master
  workflow_dispatch:
     

        
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
    
    
      - name: Set up Azure CLI
        uses: azure/login@v1 
        with:
         creds: '{"clientId":"${{ secrets.AZURE_APP_ID }}","clientSecret":"${{ secrets.AZURE_APP_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'
            

      - name: ACR build and push
        uses: azure/acr-build@v1
        with:
            tenant: ${{ secrets.AZURE_TENANT_ID }}
            service_principal: ${{ secrets.AZURE_APP_ID }}
            service_principal_password: ${{ secrets.AZURE_APP_SECRET }}
            registry: ${{ secrets.REGISTRY }}
            repository: ${{ secrets.REPO }}
            folder: ./app
            dockerfile: ./app/Dockerfile
            image: ${{ github.sha }}
            git_access_token: ${{ secrets.GITHUB_TOKEN }}


         
      - name: Deploy to AKS
        uses: azure/aks-set-context@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
          cluster-name: aks-cosmotal
          resource-group: rg-cosmotal-dva

      - name: Set up kubectl
        uses: azure/setup-kubectl@v1
        with:
          version: 'latest'

      - name: Deploy to AKS
        uses: azure/k8s-deploy@v1
        with:
          manifests: |
            k8s/blue-deploy.yaml